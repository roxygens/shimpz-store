# What this Shimpz app is and what it needs. The toolchain reads this so `shimpz-app deploy` can
# resolve [needs]. Full spec: docs/build-a-shimpz-app.md.
name = "shimpz-store"
title = "Shimpz Store"
summary = ""

[needs]
# apps   = ["other-app"]       # other Shimpz apps this one needs — installed automatically so you REUSE them
# calls  = ["other-backend"]   # service APIs to reuse (sync) — wired as declared reach (--calls)
# egress = ["api.example.com"] # external hosts you may reach — apps have NO internet by default

[provides]
skill = "shimpz/SKILL.md"       # agent-facing skill this app ships (scaffolded)

# [grants]  — scoped permissions (ONLY ones the platform actually enforces; see docs).
# consume = ["other-app.topic"]   # READ another app's bus topic (a narrow, audited ACL)
# publish = "own"                  # may be published ONLY at shimpz-store.grid.shimpz.com
# dns     = "own"                  # may manage DNS ONLY under shimpz-store.grid.shimpz.com

# [[run]]  — declare this to make `shimpz-app install shimpz-store` deploy the whole app (+ its deps) in one command.
# name = "shimpz-store-backend"
# port = 3101
# command = ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3101"]

[config]
# GREETING = { default = "Hi", help = "Shown to end users" }   # your app's OWN settings (UPPER_SNAKE)
